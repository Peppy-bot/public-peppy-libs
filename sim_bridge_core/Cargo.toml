[package]
name = "sim_bridge_core"
version = "0.1.0"
edition = "2024"

[dependencies]
tokio      = { version = "1", features = ["full"] }
tracing    = "0.1"
serde      = { version = "1", features = ["derive"] }
serde_json = "1"
# peppylib is generated by the peppy toolchain and is not published to crates-io.
# Consuming workspaces must patch it:
#   [patch.crates-io]
#   peppylib = { path = "<variant>/.peppy/libs/peppylib" }
peppylib   = "0.0.1"
