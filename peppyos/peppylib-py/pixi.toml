[workspace]
name = "peppylib"
version = "0.0.1"
description = "The peppyOS control library"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "linux-aarch64"]

[dependencies]
python = ">=3.11,<3.14"
pip = "*"

[target.osx-arm64.dependencies]
zig = "*"

[pypi-dependencies]
maturin = ">=1.0,<2.0"
pytest = ">=9.0"
pytest-asyncio = ">=1.3"

[target.linux-64.pypi-dependencies]
patchelf = ">=0.17.2.4"

[tasks]
dev = "maturin develop --locked"
release = "maturin develop --release --locked"
cross-linux-aarch64-release = "maturin build --zig --release --target aarch64-unknown-linux-gnu"
cross-linux-x86_64-release = "maturin build --zig --release --target x86_64-unknown-linux-gnu"
release-pypi = "python release_pypi.py"
test = "maturin develop && pytest tests/ -v"
