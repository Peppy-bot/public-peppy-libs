[package]
name = "config"
version.workspace = true
authors.workspace = true
edition.workspace = true

[dependencies]
clap = { version = "4", features = ["derive"] }
thiserror = "2.0"
serde = { version = "1.0", features = ["derive"] }
# `preserve_order` keeps `serde_json::Map` backed by `IndexMap` so that
# parsing a `NodeConfig` preserves `MessageFormat` field order; the capnp
# wire layout (generated by the `encoding` crate) is keyed off that order,
# so losing it breaks producer/consumer schema compat.
serde_json = { version = "1.0", features = ["preserve_order"] }
serde_json5 = "0.2"
serde_path_to_error = "0.1"
tracing = "0.1"
walkdir = "2.5"
# Used only by the `Capnp` error variant in `error.rs`; Cap'n Proto schema
# generation itself now lives in the separate `encoding` crate.
capnp = "0.26"
sha2 = "0.11"
tempfile = "3.8"
indexmap = { version = "2.2", features = ["serde"] }
dirs = "6"
# Compile-time string concatenation so the bundled peppy_config template splices
# in the buffer-size constants instead of duplicating the literals.
const_format = "0.2"

[dev-dependencies]

[features]
default = []
# Gates the fingerprint test helpers (`create_codegen_fingerprint`,
# `create_wrong_codegen_fingerprint`), which are co-located with the production
# fingerprint reader because they share its private file-layout constants. The
# git-repo/template fixtures that used to live behind this flag (and pulled in
# git2) now live in the separate `config-test-support` crate.
fingerprint_test_helpers = []
