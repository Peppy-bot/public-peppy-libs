name: peppy-shared Tests

# Standalone CI for the `peppy-shared` virtual workspace
# (public-peppy-libs/peppy-shared). The workspace is now self-contained: every
# path dependency resolves to a sibling crate within peppy-shared (config,
# core-node-api, peppy-messaging-interface, build-helpers, peppylib-rs), so it no
# longer needs the superproject checkout to build and can be tested here, in the
# repo that owns the code.

on:
  push:
    branches: [main]
    paths:
      - 'peppy-shared/**'
      - '.github/workflows/peppy-shared-tests.yml'
  pull_request:
    branches: [main, dev]
    paths:
      - 'peppy-shared/**'
      - '.github/workflows/peppy-shared-tests.yml'

concurrency:
  group: peppy-shared-tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: self-hosted
    permissions:
      contents: read
      pull-requests: read

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Give this run its own peppy data root so the reused self-hosted runner
      # does not accumulate or collide on /tmp/.peppy across runs.
      - name: Set up isolated peppy data root
        run: |
          PEPPY_RUN_HOME="$RUNNER_TEMP/peppy-home"
          mkdir -p "$PEPPY_RUN_HOME/tmpdir"
          echo "PEPPY_RUN_HOME=$PEPPY_RUN_HOME" >> "$GITHUB_ENV"

      # Rust workspace tests. Exclude peppylib-py: its cdylib build and
      # tests/python_tests.rs only wrap `pixi run test`, which the dedicated
      # Python step below runs directly.
      #
      # `--locked` enforces the committed Cargo.lock. The lock is workspace-global,
      # so this validates it against every member's manifest (peppylib-py included,
      # despite its tests being excluded) and fails the build if the lock is stale —
      # surfacing dependency drift in CI instead of silently re-resolving.
      - name: Run Rust tests
        working-directory: peppy-shared
        run: |
          export PEPPY_HOME="$PEPPY_RUN_HOME" TMPDIR="$PEPPY_RUN_HOME/tmpdir"
          cargo test --workspace --exclude peppylib-py --locked

      # Python tests for the peppylib-py extension: `pixi run test` builds the
      # native module with `maturin develop` and runs the pytest suite. Requires
      # pixi + a Python toolchain on the runner.
      - name: Run peppylib-py Python tests
        working-directory: peppy-shared/peppylib-py
        run: |
          export PEPPY_HOME="$PEPPY_RUN_HOME" TMPDIR="$PEPPY_RUN_HOME/tmpdir"
          pixi run test

      # Reclaim the per-run data root so disk does not grow on every run.
      - name: Clean up isolated peppy data root
        if: always()
        run: rm -rf "$RUNNER_TEMP/peppy-home"
